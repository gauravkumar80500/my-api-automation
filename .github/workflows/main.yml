name: Smart CRM Sync

on:
  schedule:
    - cron: '*/15 * * * *'   # हर 15 मिनट में auto run
  workflow_dispatch:         # manual run button
  push:
    paths:
      - 'ids.json'           # ids.json बदलते ही तुरंत run

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set Timezone IST
        run: sudo timedatectl set-timezone Asia/Kolkata

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          pip install requests beautifulsoup4 urllib3

      - name: Run Script
        run: python main.py

      - name: Commit and Push Updated Files
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          git add data.json history.json report.txt || true

          git commit -m "Auto update $(date +'%Y-%m-%d %H:%M:%S')" || echo "No changes to commit"

          git push

name: Auto and Manual Run

on:
  schedule:
    - cron: '*/15 * * * *'  # Ab ye har 15 minute mein apne aap chalega
  workflow_dispatch:      # Isse aap jab chahein button daba kar bhi chala sakte hain

permissions:
  contents: write         # Data save karne ke liye permission

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install requests

      - name: Run script
        run: python main.py

      - name: Save Updated Data
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          git commit -m "Automated data update (Every 15 min)" || exit 0
          git push

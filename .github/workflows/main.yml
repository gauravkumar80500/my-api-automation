name: Smart CRM Sync

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set Timezone IST
        run: sudo timedatectl set-timezone Asia/Kolkata

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install libs
        run: pip install requests beautifulsoup4 urllib3

      - name: Run Script
        run: python main.py

      - name: Push files
        run: |
          git config --global user.name "bot"
          git config --global user.email "bot@users.noreply.github.com"
          git add data.json history.json report.txt || true
          git commit -m "Auto update $(date)" || echo "no changes"
          git push

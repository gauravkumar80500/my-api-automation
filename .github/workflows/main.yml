name: Auto and Manual Run

on:
  schedule:
    - cron: '0 * * * *'  # Har 1 ghante mein chalega
  workflow_dispatch:      # Isse manual button milega

permissions:
  contents: write         # Ye line file save karne ke liye zaroori hai

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install requests

      - name: Run script
        run: python main.py

      - name: Save Updated Data
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          git commit -m "Automated data update" || exit 0
          git push
